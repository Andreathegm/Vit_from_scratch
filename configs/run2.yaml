model:
  name: "ViT-Tiny"
  in_chans: 3
  embed_dim: 192
  depth: 12
  num_heads: 3
  mlp_ratio: 4.0
  dropout: 0.15
  img_size: 224
  patch_size: 16
  attn_dropout: 0.1

training:
  run_name: "vit-fine-tune-mixup"
  epochs: 150
  lr: !!float 1e-4       # più conservativo con MixUp
  batch_size: 96
  weight_decay: 0.1      # aumentato — overfitting severo
  label_smoothing: 0.0   # MixUp produce già label soft — ridondante
  scheduler: "cosine"
  augmentation: "upresize&randomcrop+RandAugm+mask+Cutmix-mixup"
  weights_path: "checkpoints/vit-fine-tune/best.pt"

dataset:
  name: "ImageNet-100"
  num_classes: 100